name: Release

# Push to main → semantic-release computes the next version from Conventional
# Commits, updates the changelog + manifests, tags and creates a GitHub Release.
# If a release was published, the matrix builds native bundles and uploads them.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  version:
    name: Semantic release
    runs-on: ubuntu-22.04
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # cargo is needed by the prepare step (syncs Cargo.lock to the new version).
      - uses: dtolnay/rust-toolchain@stable

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build bundles
    needs: version
    if: needs.version.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest  # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest  # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            cmake \
            nasm

      - name: Install NASM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install NASM (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install nasm

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app bundles
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To enable code signing, add the APPLE_* / WINDOWS_* secrets and the
          # matching env vars here (see README "Signing & notarization").
          # Omitted by default so unsigned builds succeed: an empty
          # APPLE_CERTIFICATE makes macOS bundling fail on `security import`.
        with:
          args: ${{ matrix.args }}

      - name: Upload bundles to the release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATHS: ${{ join(fromJSON(steps.tauri.outputs.artifactPaths), '" "') }}
        run: |
          gh release upload "v${{ needs.version.outputs.version }}" "$PATHS" --clobber

  package-managers:
    needs: [version, build]
    if: needs.version.outputs.published == 'true'
    uses: ./.github/workflows/package-managers.yml
    with:
      tag: v${{ needs.version.outputs.version }}
    secrets: inherit
