name: Build release from tag

# Manually build and publish installable bundles for an existing tag. Used to
# bootstrap the first release; afterwards releases happen automatically on push
# (see release.yml).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build & publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest  # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest  # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            cmake \
            nasm

      - name: Install NASM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install NASM (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install nasm

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish bundles to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To enable code signing, add the APPLE_* / WINDOWS_* secrets and the
          # matching env vars here (see README "Signing & notarization").
          # They are intentionally omitted so unsigned builds succeed: an empty
          # APPLE_CERTIFICATE makes macOS bundling fail on `security import`.
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "OCC Companion ${{ inputs.tag }}"
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  package-managers:
    needs: build
    uses: ./.github/workflows/package-managers.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit
